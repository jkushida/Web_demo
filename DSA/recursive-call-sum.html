<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>再帰呼び出しの手順</title>
  <style>
    :root {
      --bg: #f8fafc;
      --panel: #fff;
      --line: #d1d5db;
      --fg: #111827;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-bg: #dbeafe;
      --return: #dc2626;
      --return-bg: #fee2e2;
      --active: #fef08a;
      --code-bg: #f8fafc;
      --frame: #f4f7fb;
      --n-bg: #fdebdc;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
      color: var(--fg);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      padding: 4px 12px 3px;
      border-bottom: 1px solid #e5e7eb;
      background: #fff;
    }

    header p {
      margin: 0 0 2px;
      font-size: 12px;
    }

    header a {
      color: var(--primary);
      text-decoration: none;
    }

    header a:hover { text-decoration: underline; }

    h1 {
      margin: 0;
      font-size: 16px;
      font-weight: 800;
    }

    main {
      min-height: 0;
      padding: 6px 10px;
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 6px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      box-shadow: 0 1px 3px rgba(15, 23, 42, .04);
    }

    .concept {
      padding: 5px 10px;
      display: grid;
      grid-template-columns: auto minmax(360px, 1fr);
      gap: 12px;
      align-items: center;
    }

    .formula {
      margin: 0;
      font-size: 15px;
      font-weight: 800;
      white-space: nowrap;
    }

    .formula .math {
      font-family: Georgia, "Times New Roman", serif;
      font-style: italic;
      letter-spacing: .02em;
    }

    .concept-note {
      margin: 0;
      padding: 4px 8px;
      border: 2px solid #ef4444;
      color: #111827;
      font-size: 12px;
      font-weight: 800;
      line-height: 1.25;
      background: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .controls-panel {
      padding: 5px 9px;
      display: grid;
      gap: 6px;
    }

    .ctrl-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    select,
    input[type="range"],
    button {
      font: inherit;
    }

    select {
      min-height: 28px;
      padding: 3px 8px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: var(--fg);
      font-size: 13px;
    }

    button {
      min-height: 28px;
      padding: 4px 10px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: var(--fg);
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
    }

    button:hover { background: #f1f5f9; }

    button.primary {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: .45;
    }

    .progress-wrap {
      flex: 1;
      min-width: 140px;
      height: 5px;
      overflow: hidden;
      border-radius: 999px;
      background: #e5e7eb;
    }

    #progressBar {
      width: 0%;
      height: 100%;
      background: var(--primary);
      transition: width .18s;
    }

    .step-info {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .content-grid {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px;
      gap: 8px;
    }

    .left-stack {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 8px;
    }

    .stage-panel {
      padding: 9px 11px;
    }

    .stage-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 6px;
    }

    .stage-head h2,
    .side-panel h2 {
      margin: 0;
      font-size: 13px;
      font-weight: 800;
    }

    #stageTitle {
      color: var(--primary);
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    #stageMessage {
      margin: 0;
      padding: 7px 9px;
      border: 1px solid #bfdbfe;
      border-radius: 8px;
      background: #eff6ff;
      color: #1f2937;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.45;
    }

    .frames-panel {
      position: relative;
      min-height: 0;
      padding: 8px 10px 10px;
      overflow: auto;
    }

    .recursion-scene {
      position: relative;
      min-width: max-content;
      padding: 78px 0 52px;
    }

    .main-call {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 4;
      padding: 4px 8px;
      border-radius: 4px;
      background: #f3f4f6;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 15px;
      line-height: 1.25;
      box-shadow: inset 0 -1px 0 rgba(15, 23, 42, .06);
    }

    .main-call .main-line-no {
      display: inline-block;
      min-width: 24px;
      margin-right: 5px;
      color: #6b7280;
      text-align: right;
    }

    .arrow-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
      pointer-events: none;
      z-index: 3;
    }

    .arrow-layer path {
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .arrow-call {
      stroke: #3f73c8;
      stroke-width: 4;
      opacity: .5;
    }

    .arrow-return {
      stroke: #dc0000;
      stroke-width: 4;
      opacity: .5;
    }

    .arrow-muted {
      opacity: .16;
    }

    .arrow-active {
      opacity: 1;
      filter: drop-shadow(0 2px 4px rgba(37, 99, 235, .25));
      stroke-dasharray: 12 8;
      animation: dashFlow .6s linear infinite, arrowPulse .7s ease-in-out infinite alternate;
    }

    .return-label {
      position: absolute;
      z-index: 4;
      min-width: 72px;
      transform: translateX(-50%);
      color: #dc0000;
      text-align: center;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 24px;
      font-weight: 900;
      line-height: 1.08;
    }

    .main-call-label {
      position: absolute;
      z-index: 4;
      transform: translateX(-50%);
      padding: 3px 8px;
      border: 2px solid #3f73c8;
      border-radius: 999px;
      background: #eff6ff;
      color: #2563eb;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .frames {
      min-width: max-content;
      display: flex;
      align-items: stretch;
      gap: 28px;
      padding: 4px 0 8px;
      position: relative;
      z-index: 2;
    }

    .frame-wrap {
      width: 260px;
      position: relative;
    }

    .frame {
      position: relative;
      padding: 12px 8px 7px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      background: var(--frame);
      transition: border-color .18s, transform .18s, box-shadow .18s;
    }

    .frame.active {
      border-color: var(--primary);
      box-shadow: 0 8px 18px rgba(37, 99, 235, .14);
      transform: translateY(-2px);
    }

    .frame.returning {
      border-color: var(--return);
      box-shadow: 0 8px 18px rgba(220, 38, 38, .13);
    }

    .n-badge {
      position: absolute;
      top: -8px;
      left: 58%;
      transform: translateX(-50%);
      min-width: 36px;
      padding: 3px 8px;
      border: 2px solid #9ca3af;
      border-radius: 4px;
      background: var(--n-bg);
      text-align: center;
      font-size: 20px;
      font-weight: 900;
      line-height: 1;
      z-index: 5;
    }

    .n-badge::before {
      content: "";
      position: absolute;
      left: 50%;
      top: calc(100% - 1px);
      width: 0;
      height: 32px;
      border-left: 3px solid #9ca3af;
      transform: translateX(-50%);
    }

    .n-badge::after {
      content: "";
      position: absolute;
      left: 50%;
      top: calc(100% + 25px);
      width: 9px;
      height: 9px;
      border-right: 3px solid #9ca3af;
      border-bottom: 3px solid #9ca3af;
      transform: translateX(-50%) rotate(45deg);
    }

    .frame-title {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin: 2px 0 5px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }

    .code {
      margin: 0;
      padding: 4px 0;
      list-style: none;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      background: #fff;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      overflow: hidden;
    }

    .code-line {
      display: grid;
      grid-template-columns: 28px 1fr;
      column-gap: 7px;
      align-items: center;
      min-height: 15px;
      padding: 0 6px;
      color: #1f2937;
      font-size: 11px;
      line-height: 1.2;
    }

    .code-line.active {
      background: var(--active);
      font-weight: 800;
    }

    .ln {
      color: #94a3b8;
      text-align: right;
      user-select: none;
    }

    .src {
      white-space: pre;
    }

    .kw { color: #7c3aed; font-weight: 800; }
    .fn { color: #1d4ed8; }
    .cm { color: #15803d; font-weight: 700; }
    .ret { color: #c026d3; font-weight: 800; }
    .num { color: #059669; font-weight: 800; }

    .local {
      margin-top: 5px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5px;
    }

    .local-card {
      padding: 3px 6px;
      border: 1px solid #dbe3ef;
      border-radius: 7px;
      background: #fff;
      text-align: center;
    }

    .local-label {
      color: var(--muted);
      font-size: 10px;
      font-weight: 800;
    }

    .local-value {
      font-size: 15px;
      font-weight: 900;
    }

    @keyframes pop {
      from { transform: translateY(0) scale(1); }
      to { transform: translateY(-2px) scale(1.04); }
    }

    @keyframes arrowPulse {
      from { stroke-width: 4; }
      to { stroke-width: 5.5; }
    }

    @keyframes dashFlow {
      from { stroke-dashoffset: 20; }
      to { stroke-dashoffset: 0; }
    }

    .side-stack {
      min-height: 0;
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 8px;
    }

    .side-panel {
      padding: 9px 10px;
    }

    .legend {
      display: grid;
      grid-template-columns: 1fr;
      gap: 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .legend-box {
      width: 13px;
      height: 13px;
      border-radius: 3px;
      border: 2px solid transparent;
    }

    .stack-list {
      display: grid;
      gap: 5px;
      margin-top: 7px;
    }

    .stack-item {
      padding: 5px 7px;
      border: 1px solid #dbe3ef;
      border-radius: 7px;
      background: #fff;
      font-size: 12px;
      font-weight: 800;
    }

    .stack-item.active {
      border-color: var(--primary);
      background: var(--primary-bg);
      color: #1d4ed8;
    }

    .history {
      min-height: 0;
      overflow-y: auto;
      display: grid;
      align-content: start;
      gap: 5px;
      padding-right: 4px;
      scrollbar-gutter: stable;
    }

    .history-row {
      display: grid;
      grid-template-columns: 58px 1fr;
      gap: 7px;
      align-items: start;
      padding: 5px 7px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #fff;
      color: #374151;
      font-size: 12px;
      line-height: 1.35;
      opacity: .55;
    }

    .history-row.current {
      border-color: #93c5fd;
      background: #eff6ff;
      opacity: 1;
      font-weight: 800;
    }

    .history-step {
      color: var(--muted);
      font-weight: 900;
      white-space: nowrap;
    }

    @media (max-width: 920px) {
      main {
        display: block;
        overflow: auto;
      }

      .concept,
      .content-grid {
        grid-template-columns: 1fr;
      }

      .concept,
      .controls-panel,
      .content-grid {
        margin-bottom: 8px;
      }

      .side-stack {
        grid-template-rows: auto;
      }
    }
  </style>
</head>
<body>
  <header>
    <p><a href="../index.html">← デモ一覧へ戻る</a></p>
    <h1>再帰呼び出しの手順</h1>
  </header>

  <main>
    <section class="panel concept">
      <p class="formula"><span class="math">n</span> = <span id="formulaN">3</span> として，
        <span class="math">S</span><sub id="formulaSub">3</sub> =
        <span id="formulaText">1 + 2 + 3</span> を求める場合</p>
      <p class="concept-note">同じ calc_sum 関数だが，それぞれ独立した領域で異なる値の n を持って動作する</p>
    </section>

    <section class="panel controls-panel">
      <div class="ctrl-row">
        <label for="nInput">n =</label>
        <select id="nInput" onchange="resetDemo()">
          <option value="3" selected>3</option>
          <option value="4">4</option>
          <option value="5">5</option>
        </select>
        <button id="prevBtn" onclick="stepBack()">1ステップ戻る</button>
        <button id="nextBtn" onclick="stepForward()">1ステップ進む</button>
        <button id="playBtn" class="primary" onclick="togglePlay()">再生</button>
        <button id="pauseBtn" onclick="togglePlay()" disabled>一時停止</button>
        <button onclick="resetDemo()">リセット</button>
      </div>
      <div class="ctrl-row">
        <label>速度
          <input id="speedInput" type="range" min="0.5" max="4" step="0.5" value="1.5" />
          <span id="speedLabel">1.5x</span>
        </label>
        <div class="progress-wrap"><div id="progressBar"></div></div>
        <span id="stepInfo" class="step-info">— / —</span>
      </div>
    </section>

    <div class="content-grid">
      <div class="left-stack">
        <section class="panel stage-panel">
          <div class="stage-head">
            <h2>現在の処理</h2>
            <span id="stageTitle">—</span>
          </div>
          <p id="stageMessage">—</p>
        </section>

        <section class="panel frames-panel">
          <div id="recursionScene" class="recursion-scene">
            <div id="mainCall" class="main-call"></div>
            <div id="frames" class="frames"></div>
            <svg id="arrowLayer" class="arrow-layer" aria-hidden="true"></svg>
          </div>
        </section>
      </div>

      <div class="side-stack">
        <section class="panel side-panel">
          <h2>凡例</h2>
          <div class="legend">
            <div class="legend-item"><span class="legend-box" style="border-color:#2563eb;background:#dbeafe"></span>青: 再帰呼び出し</div>
            <div class="legend-item"><span class="legend-box" style="border-color:#dc2626;background:#fee2e2"></span>赤: 戻り値を返す</div>
            <div class="legend-item"><span class="legend-box" style="border-color:#111827;background:#fdebdc"></span>各領域の n</div>
          </div>
        </section>

        <section class="panel side-panel">
          <h2>コールスタック</h2>
          <div id="stackList" class="stack-list"></div>
        </section>

        <section class="panel side-panel">
          <h2>ステップ履歴</h2>
          <div id="history" class="history"></div>
        </section>
      </div>
    </div>
  </main>

  <script>
    let steps = [];
    let current = 0;
    let playing = false;
    let timer = null;

    function sumTo(n) {
      return (n * (n + 1)) / 2;
    }

    function makeFormula(n) {
      return Array.from({ length: n }, (_, i) => i + 1).join(" + ");
    }

    function generateSteps(n) {
      const built = [];
      const active = [];

      const pushStep = (type, title, message, extra = {}) => {
        built.push({
          type,
          title,
          message,
          activeNs: [...active],
          ...extra
        });
      };

      pushStep("main", "main から呼び出し", `calc_sum(${n}) を呼び出して S${n} を求める`, { line: 14 });

      for (let k = n; k >= 1; k--) {
        active.push(k);
        pushStep("enter", `calc_sum(${k}) の領域を作る`, `新しい領域を確保し，この領域の n は ${k} になる`, { focus: k, line: 2 });

        if (k === 1) {
          pushStep("base-check", "終了条件を確認", "n == 1 なので，これ以上小さい問題には分けない", { focus: k, line: 4 });
          pushStep("base-return", "S1 を返す", "calc_sum(1) は 1 を返す", { focus: k, line: 5, returns: { [k]: 1 }, returnFrom: k });
        } else {
          pushStep("check", "終了条件を確認", `n = ${k} なので n == 1 ではない`, { focus: k, line: 4 });
          pushStep("call", `calc_sum(${k - 1}) を呼び出す`, `S${k} を求めるために，まず S${k - 1} を求める`, { focus: k, line: 9, callFrom: k, callTo: k - 1 });
        }
      }

      for (let k = 2; k <= n; k++) {
        const child = sumTo(k - 1);
        const value = sumTo(k);
        pushStep("combine", `S${k} を計算する`, `calc_sum(${k - 1}) の戻り値 ${child} に ${k} を足して ${value} を作る`, {
          focus: k,
          line: 9,
          returns: Object.fromEntries(Array.from({ length: k - 1 }, (_, i) => [i + 1, sumTo(i + 1)])),
          sumValue: { n: k, child, value },
          returnFrom: k - 1,
          returnTo: k
        });
        active.pop();
        pushStep("return", `S${k} を返す`, `calc_sum(${k}) は ${value} を返す`, {
          focus: k,
          line: 11,
          returns: Object.fromEntries(Array.from({ length: k }, (_, i) => [i + 1, sumTo(i + 1)])),
          returnFrom: k,
          returnTo: k + 1 <= n ? k + 1 : null
        });
      }

      return built;
    }

    function codeLines(frameN, activeLine) {
      const lines = [
        [1, '<span class="cm"># Snを求める関数</span>'],
        [2, '<span class="kw">def</span> <span class="fn">calc_sum</span>(<span class="arg-n">n</span>):'],
        [3, ""],
        [4, '  <span class="kw">if</span> n == <span class="num">1</span>:'],
        [5, '    <span class="ret">return</span> <span class="num">1</span>'],
        [6, ""],
        [7, '<span class="cm">  # nが1つ小さい部分問題を呼び出す</span>'],
        [8, '<span class="cm">  # 関数calc_sum(n-1)を呼び出す</span>'],
        [9, '  Sum = calc_sum(n - <span class="num">1</span>) + n'],
        [10, ""],
        [11, '  <span class="ret">return</span> Sum']
      ];

      return lines.map(([num, html]) => {
        const li = document.createElement("li");
        li.className = "code-line" + (num === activeLine ? " active" : "");
        li.dataset.line = num;
        const ln = document.createElement("span");
        ln.className = "ln";
        ln.textContent = num;
        const code = document.createElement("span");
        code.className = "src";
        code.innerHTML = html;
        li.append(ln, code);
        return li;
      });
    }

    function renderFrame(n, step) {
      const wrap = document.createElement("div");
      wrap.className = "frame-wrap";

      const frame = document.createElement("div");
      const isActive = step.focus === n || (step.type === "finish" && n === Number(document.getElementById("nInput").value));
      const isReturning = step.returnFrom === n;
      frame.className = "frame" + (isActive ? " active" : "") + (isReturning ? " returning" : "");
      frame.dataset.frame = n;

      const badge = document.createElement("div");
      badge.className = "n-badge";
      badge.textContent = n;

      const title = document.createElement("div");
      title.className = "frame-title";
      const name = document.createElement("span");
      name.textContent = `calc_sum(${n})`;
      const local = document.createElement("span");
      local.textContent = `この領域の n = ${n}`;
      title.append(name, local);

      const code = document.createElement("ol");
      code.className = "code";
      codeLines(n, isActive ? step.line : null).forEach(line => code.appendChild(line));

      const locals = document.createElement("div");
      locals.className = "local";
      const nCard = localCard("n", n);
      const sum = step.returns && step.returns[n] ? step.returns[n] : (step.sumValue && step.sumValue.n === n ? step.sumValue.value : "—");
      const sumCard = localCard("Sum", sum);
      locals.append(nCard, sumCard);

      frame.append(badge, title, code, locals);
      wrap.appendChild(frame);

      return wrap;
    }

    function alignBadgesToArguments() {
      document.querySelectorAll("[data-frame]").forEach(frame => {
        const badge = frame.querySelector(".n-badge");
        const arg = frame.querySelector(".arg-n");
        if (!badge || !arg) return;

        const frameRect = frame.getBoundingClientRect();
        const argRect = arg.getBoundingClientRect();
        const argCenter = argRect.left - frameRect.left + argRect.width / 2;
        badge.style.left = `${argCenter}px`;
      });
    }

    function pointInScene(scene, element, xRatio, yRatio) {
      const sceneRect = scene.getBoundingClientRect();
      const rect = element.getBoundingClientRect();
      return {
        x: rect.left - sceneRect.left + rect.width * xRatio + scene.scrollLeft,
        y: rect.top - sceneRect.top + rect.height * yRatio + scene.scrollTop
      };
    }

    function makePath(className, d, marker) {
      const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
      path.setAttribute("class", className);
      path.setAttribute("d", d);
      path.setAttribute("marker-end", `url(#${marker})`);
      return path;
    }

    function renderArrows(step) {
      const n = Number(document.getElementById("nInput").value);
      const scene = document.getElementById("recursionScene");
      const svg = document.getElementById("arrowLayer");
      const frames = document.getElementById("frames");
      const mainCall = document.getElementById("mainCall");

      mainCall.innerHTML = `<div><span class="main-line-no">13</span><span class="cm"># 引数nは${n}</span></div><div><span class="main-line-no">14</span>calc_sum(<span class="num">${n}</span>)</div>`;
      const topFrameForMain = frames.querySelector("[data-frame]");
      const frameOffset = topFrameForMain?.offsetLeft ?? 0;
      mainCall.style.left = `${Math.max(0, frameOffset + 20)}px`;

      const width = Math.max(scene.scrollWidth, scene.clientWidth);
      const height = Math.max(scene.scrollHeight, scene.clientHeight);
      svg.setAttribute("viewBox", `0 0 ${width} ${height}`);
      svg.setAttribute("width", width);
      svg.setAttribute("height", height);
      svg.innerHTML = `
        <defs>
          <marker id="arrowHeadCall" markerWidth="18" markerHeight="18" refX="15" refY="9" orient="auto" markerUnits="userSpaceOnUse">
            <path d="M3,3 L15,9 L3,15" fill="none" stroke="#3f73c8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></path>
          </marker>
          <marker id="arrowHeadReturn" markerWidth="18" markerHeight="18" refX="15" refY="9" orient="auto" markerUnits="userSpaceOnUse">
            <path d="M3,3 L15,9 L3,15" fill="none" stroke="#dc0000" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></path>
          </marker>
        </defs>`;

      const makeLabel = (x, y, html) => {
        const label = document.createElement("div");
        label.className = "return-label";
        label.style.left = `${x}px`;
        label.style.top = `${y}px`;
        label.innerHTML = html;
        scene.appendChild(label);
      };

      const makeMainCallLabel = (x, y) => {
        const label = document.createElement("div");
        label.className = "main-call-label";
        label.style.left = `${x}px`;
        label.style.top = `${y}px`;
        label.textContent = "main から呼び出し";
        scene.appendChild(label);
      };

      scene.querySelectorAll(".return-label, .main-call-label").forEach(label => label.remove());

      const firstFrame = scene.querySelector(`[data-frame="${n}"]`);
      if (firstFrame) {
        const firstLine2 = firstFrame.querySelector('[data-line="2"] .src');
        const end = firstLine2 ? pointInScene(scene, firstLine2, .34, .05) : pointInScene(scene, firstFrame, .50, .10);
        const start = { x: end.x, y: pointInScene(scene, mainCall, .70, 1).y };
        const mainActive = step.type === "main" || (step.type === "enter" && step.focus === n);
        const d = `M ${start.x} ${start.y + 4} L ${end.x} ${end.y}`;
        svg.appendChild(makePath("arrow-call" + (mainActive ? " arrow-active" : " arrow-muted"), d, "arrowHeadCall"));
        if (mainActive) {
          makeMainCallLabel(end.x + 130, Math.max(start.y + 8, end.y - 30));
        }
      }

      for (let k = n; k >= 2; k--) {
        const parent = scene.querySelector(`[data-frame="${k}"]`);
        const child = scene.querySelector(`[data-frame="${k - 1}"]`);
        if (!parent || !child) continue;

        const parentLine9 = parent.querySelector('[data-line="9"]');
        const parentLine9Src = parent.querySelector('[data-line="9"] .src');
        const childLine2Src = child.querySelector('[data-line="2"] .src');
        const childReturnLine = child.querySelector(`[data-line="${k - 1 === 1 ? 5 : 11}"]`);
        if (!parentLine9 || !parentLine9Src || !childLine2Src || !childReturnLine) continue;

        const callStart = pointInScene(scene, parentLine9Src, .58, .05);
        const callEnd = pointInScene(scene, childLine2Src, .30, .78);
        const callActive = step.callFrom === k && step.callTo === k - 1;
        const callHasHappened = child.classList.contains("returning")
          || step.activeNs.includes(k - 1)
          || Boolean(step.returns && step.returns[k - 1])
          || callActive;
        if (callHasHappened) {
          svg.appendChild(makePath(
            "arrow-call" + (callActive ? " arrow-active" : " arrow-muted"),
            `M ${callStart.x} ${callStart.y} L ${callEnd.x} ${callEnd.y}`,
            "arrowHeadCall"
          ));
        }

        const returnStart = pointInScene(scene, childReturnLine, .42, .9);
        const sceneRect = scene.getBoundingClientRect();
        const parentCode = parent.querySelector(".code").getBoundingClientRect();
        const childCode = child.querySelector(".code").getBoundingClientRect();
        const bottom = Math.max(parentCode.bottom, childCode.bottom) - sceneRect.top + scene.scrollTop + 12;
        const returnEnd = pointInScene(scene, parentLine9, .50, .70);
        const returnActive = (step.returnFrom === k - 1 && step.returnTo === k) || (step.sumValue && step.sumValue.n === k);
        const returnHasHappened = Boolean(step.returns && step.returns[k - 1]) || returnActive;
        if (returnHasHappened) {
          svg.appendChild(makePath(
            "arrow-return" + (returnActive ? " arrow-active" : " arrow-muted"),
            `M ${returnStart.x} ${returnStart.y} L ${returnStart.x} ${bottom} L ${returnEnd.x} ${bottom} L ${returnEnd.x} ${returnEnd.y}`,
            "arrowHeadReturn"
          ));
        }
        if (returnHasHappened && step.returns && step.returns[k - 1]) {
          makeLabel((returnStart.x + returnEnd.x) / 2 + 8, bottom + 6, `${step.returns[k - 1]}<br>(S<sub>${k - 1}</sub>)`);
        }
      }

      const topFrame = scene.querySelector(`[data-frame="${n}"]`);
      const topLine11 = topFrame?.querySelector('[data-line="11"]');
      if (topFrame && topLine11 && step.returns && step.returns[n]) {
        const start = pointInScene(scene, topLine11, .42, .9);
        const topRect = topFrame.getBoundingClientRect();
        const sceneRect = scene.getBoundingClientRect();
        const bottom = topRect.bottom - sceneRect.top + scene.scrollTop + 28;
        const topReturnActive = step.returnFrom === n || step.type === "finish";
        svg.appendChild(makePath(
          "arrow-return" + (topReturnActive ? " arrow-active" : " arrow-muted"),
          `M ${start.x} ${start.y} L ${start.x} ${bottom}`,
          "arrowHeadReturn"
        ));
        if (topReturnActive) {
          makeLabel(start.x, bottom + 6, `${step.returns[n]}<br>(S<sub>${n}</sub>)`);
        }
      }
    }

    function visibleFrames(step, n) {
      const visible = new Set(step.activeNs);

      if (step.focus) visible.add(step.focus);
      if (step.callFrom) visible.add(step.callFrom);
      if (step.callTo) visible.add(step.callTo);
      if (step.returnFrom) visible.add(step.returnFrom);
      if (step.returnTo) visible.add(step.returnTo);
      if (step.sumValue) visible.add(step.sumValue.n);
      if (step.returns) {
        Object.keys(step.returns).forEach(key => visible.add(Number(key)));
      }

      return Array.from(visible)
        .filter(value => value >= 1 && value <= n)
        .sort((a, b) => b - a);
    }

    function localCard(label, value) {
      const card = document.createElement("div");
      card.className = "local-card";
      const labelEl = document.createElement("div");
      labelEl.className = "local-label";
      labelEl.textContent = label;
      const valueEl = document.createElement("div");
      valueEl.className = "local-value";
      valueEl.textContent = value;
      card.append(labelEl, valueEl);
      return card;
    }

    function render() {
      const n = Number(document.getElementById("nInput").value);
      const step = steps[current];

      document.getElementById("formulaN").textContent = n;
      document.getElementById("formulaSub").textContent = n;
      document.getElementById("formulaText").textContent = makeFormula(n);
      document.getElementById("stageTitle").textContent = step.title;
      document.getElementById("stageMessage").textContent = step.message;

      const frames = document.getElementById("frames");
      frames.innerHTML = "";
      visibleFrames(step, n).forEach(k => {
        frames.appendChild(renderFrame(k, step));
      });
      alignBadgesToArguments();
      renderArrows(step);

      renderStack(step);
      renderHistory();
      updateControls();
    }

    function renderStack(step) {
      const stack = document.getElementById("stackList");
      stack.innerHTML = "";

      if (!step.activeNs.length) {
        const empty = document.createElement("div");
        empty.className = "stack-item";
        empty.textContent = "(空)";
        stack.appendChild(empty);
        return;
      }

      [...step.activeNs].reverse().forEach(value => {
        const item = document.createElement("div");
        item.className = "stack-item" + (value === step.focus ? " active" : "");
        item.textContent = `calc_sum(${value})`;
        stack.appendChild(item);
      });
    }

    function renderHistory() {
      const history = document.getElementById("history");
      history.innerHTML = "";

      steps.slice(0, current + 1).forEach((step, index) => {
        const row = document.createElement("div");
        row.className = "history-row" + (index === current ? " current" : "");
        const label = document.createElement("div");
        label.className = "history-step";
        label.textContent = `${index + 1}`;
        const text = document.createElement("div");
        text.textContent = step.title;
        row.append(label, text);
        history.appendChild(row);
      });

      history.scrollTop = history.scrollHeight;
    }

    function updateControls() {
      const total = steps.length;
      document.getElementById("stepInfo").textContent = `ステップ ${current + 1} / ${total}`;
      document.getElementById("progressBar").style.width = `${(current / Math.max(1, total - 1)) * 100}%`;
      document.getElementById("prevBtn").disabled = current <= 0;
      document.getElementById("nextBtn").disabled = current >= total - 1;
      document.getElementById("playBtn").disabled = current >= total - 1;
      document.getElementById("pauseBtn").disabled = !playing;
    }

    function stepForward() {
      if (current >= steps.length - 1) return;
      current += 1;
      render();
    }

    function stepBack() {
      if (current <= 0) return;
      current -= 1;
      render();
    }

    function getDelay() {
      return Math.round(1000 / Number(document.getElementById("speedInput").value));
    }

    function startPlay() {
      if (current >= steps.length - 1) {
        resetDemo();
      }
      playing = true;
      updateControls();
      tick();
    }

    function stopPlay() {
      playing = false;
      clearTimeout(timer);
      updateControls();
    }

    function togglePlay() {
      if (playing) stopPlay();
      else startPlay();
    }

    function tick() {
      timer = setTimeout(() => {
        if (!playing) return;
        if (current >= steps.length - 1) {
          stopPlay();
          return;
        }
        stepForward();
        tick();
      }, getDelay());
    }

    function resetDemo() {
      stopPlay();
      const n = Number(document.getElementById("nInput").value);
      steps = generateSteps(n);
      current = 0;
      render();
    }

    document.getElementById("speedInput").addEventListener("input", event => {
      document.getElementById("speedLabel").textContent = `${Number(event.target.value).toFixed(1)}x`;
    });

    resetDemo();
  </script>
</body>
</html>
